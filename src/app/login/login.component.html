<!-- Title Page -->
<section class="bg-title-page flex-c-m  p-t-20 p-b-80 p-l-15 p-r-15"
    style="background-image: url(assets/images/bg-title-page-02.jpg);">
    <h2 class="tit6 t-center">
        Healthy Indian Thali
    </h2>
    
</section>
<!-- Contact form -->
<section class="section-contact bg1-pattern">
    <div class="container">
        <!-- <h3 class="tit7 t-center p-b-62 p-t-105">
            Login
        </h3> -->
        <div class="row g-5">
            <div class="col-lg-3"></div>
            <div class="col-lg-6 wow fadeIn" data-wow-delay="0.1s">
                <h3 class="mt-5"><a routerLink="/customer/home">Go To HOME</a></h3>
                <h1 class="display-5 mb-3 ">Login for more...</h1>
                <p class="mb-2">Don't have account?/ <a routerLink="/customer/register">Register</a>.</p>
                <form class="wrap-form-reservation size22 m-l-r-auto" (ngSubmit)="loginSubmit()" #loginForm="ngForm">
                    <div class="row">
                        <div class="col-md-12">
                            <!-- Email -->
                            <div class="txt9">
                                Enter your Email
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="email"
                                    placeholder="Email" [(ngModel)]="email" required>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <!-- Password -->
                            <div class="txt9">
                                Enter your Password
                            </div>

                            <div class="wrap-inputphone size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="password" name="password"
                                    placeholder="password(3 or more characters)" [(ngModel)]="password" required>
                            </div>
                        </div>


                    </div>

                    <div class="wrap-btn-booking flex-c-m m-t-13 ">
                        <!-- Button3 -->
                        <button type="submit" class="btn3 flex-c-m size36 txt11 trans-0-4 m-b-35" [disabled]="loginForm.invalid">
                            Submit
                        </button>
                    </div>
                </form>
            </div>
            <div class="col-lg-3"></div>
        </div>
    </div>
</section>
