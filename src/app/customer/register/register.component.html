<!-- Title Page -->
<section class="bg-title-page flex-c-m p-t-160 p-b-80 p-l-15 p-r-15"
    style="background-image: url(assets/images/bg-title-page-03.jpg);">
    <h2 class="tit6 t-center">
        REGISTER
    </h2>
</section>
<!-- Contact form -->
<section class="section-contact bg1-pattern">
    <div class="container">
        <div class="row g-5">
            <div class="col-lg-3"></div>
            <div class="col-lg-6 wow fadeIn" data-wow-delay="0.1s">
                <h1 class="display-5 mb-3 mt-5">Register</h1>
                <p class="mb-2">Already have account?/ <a routerLink="/login">Login</a>.</p>
                <form class="wrap-form-reservation size22 m-l-r-auto" (submit)="registerSubmit()">
                    <div class="row">
                        <div class="col-md-12">
                            <!-- Name -->
                            <div class="txt9">
                                Enter your Name
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="name"
                                    placeholder="Name" [(ngModel)]="userObj.name">
                            </div>
                        </div>
                        <div class="col-md-12">
                            <!-- Email -->
                            <div class="txt9">
                                Enter your Email
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="email"
                                    placeholder="Email" [(ngModel)]="userObj.email">
                            </div>
                        </div>
                        <div class="col-md-12">
                            <!-- Password -->
                            <div class="txt9">
                                Enter Password
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="password" name="password"
                                    placeholder="Password" [(ngModel)]="userObj.password">
                            </div>
                        </div>

                        <div class="col-md-12">
                            <!-- Contact -->
                            <div class="txt9">
                                Enter your contact
                            </div>

                            <div class="wrap-inputphone size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="contact"
                                    placeholder="Contact" [(ngModel)]="userObj.contact">
                            </div>
                        </div>
                        <div class="col-12">
                            <!-- Address -->
                            <span class="txt9">
                                Address
                            </span>
                            <textarea class="bo-rad-10 size35 bo2 txt10 p-l-20 p-t-15 m-b-10 m-t-3" name="address"
                                placeholder="Address" [(ngModel)]="userObj.address"></textarea>
                        </div>
                    </div>

                    <div class="wrap-btn-booking flex-c-m m-t-13 ">
                        <!-- Button3 -->
                        <button type="submit" class="btn3 flex-c-m size36 txt11 trans-0-4 m-b-35">
                            Submit
                        </button>
                    </div>
                </form>
            </div>
            <div class="col-lg-3"></div>
        </div>
    </div>
</section>
