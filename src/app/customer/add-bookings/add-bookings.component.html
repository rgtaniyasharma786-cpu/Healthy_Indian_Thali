<!-- Title Page -->
<section class="bg-title-page flex-c-m p-t-160 p-b-80 p-l-15 p-r-15"
    style="background-image: url(assets/images/bg-title-page-02.jpg);">
    <h2 class="tit6 t-center " style="color: rgb(243, 138, 138); cursor: pointer;" routerLink="/admin/manage-meals">Manage Meals /</h2><h1 style="color: white;">Make Booking</h1>
</section>

<section class="section-contact bg1-pattern">
    <div class="container">
        <div class="row g-5">
            <div class="col-lg-3"></div>
            <div class="col-lg-6 wow fadeIn" data-wow-delay="0.1s">
                <form class="wrap-form-reservation size22 m-l-r-auto" (submit)="addSubmit()" #form="ngForm">
                    <div class="row pt-5">
                        <div class="col-md-12">
                            <div class="txt9">
                                Customer Name
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="customerName" placeholder="Enter Customer Name" [(ngModel)]="bookingObj.customerName" readonly>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="txt9">
                                Price
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="price" placeholder="Enter Price" [(ngModel)]="bookingObj.price" readonly>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="txt9">
                                Duration
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <select class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="duration" placeholder="Enter duration" [(ngModel)]="bookingObj.duration" disabled="">
                                    <option value="1" selected>1 Month</option>
                                    <option value="2">2 Month</option>
                                    <option value="3">3 Month</option>
                                    <option value="4">4 Month</option>
                                    <option value="5">5 Month</option>
                                    <option value="6">6 Month</option>
                                    <option value="7">7 Month</option>
                                    <option value="8">8 Month</option>
                                    <option value="9">9 Month</option>
                                    <option value="10">10 Month</option>
                                    <option value="11">11 Month</option>
                                    <option value="12">12 Month</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="txt9">
                                Start Date
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="date" name="start"
                                    placeholder="Enter Start Date" [(ngModel)]="bookingObj.start" [min]="minDate" (change)="calcEndDate($event)">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="txt9">
                                End Date
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="date" name="end"
                                    placeholder="Enter End" [(ngModel)]="bookingObj.end" readonly>
                            </div>
                        </div>
                    
                        <div class="wrap-btn-booking flex-c-m m-t-13 ">
                            <button type="submit" class="btn3 flex-c-m size36 txt11 trans-0-4 m-b-35">
                               Book
                            </button>

                        </div>
                    </div>
                </form>
            </div>
            <div class="col-lg-3"></div>
        </div>
    </div>
</section>
