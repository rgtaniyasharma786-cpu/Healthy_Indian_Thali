
<section class="bg-title-page flex-c-m p-t-160 p-b-80 p-l-15 p-r-15"
    style="background-image: url(assets/images/dinner-02.jpg);">
    <h2 class="tit6 t-center" style="color: rgb(243, 138, 138); cursor: pointer;" routerLink="/admin/manage-pricing">Manage Pricing /</h2>
    <h1 style="color: white;">Add-Pricing</h1>
</section>

<section class="section-contact bg1-pattern">
    <div class="container">
        <div class="row g-5">
            <div class="col-lg-3"></div>
            <div class="col-lg-6 wow fadeIn" data-wow-delay="0.1s">
                <form class="wrap-form-reservation size22 m-l-r-auto" (submit)="addSubmit()">
                    <div class="row pt-5">
                        <div class="col-md-6">
                            <div class="txt9">
                                Duration
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <select class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="duration"
                                    placeholder="Duration" [(ngModel)]="priceObj.duration">

                                    <option value="1" selected>1 Month</option>
                                    <option value="2">2 Month</option>
                                    <option value="3">3 Month</option>
                                    <option value="4">4 Month</option>
                                    <option value="5">5 Month</option>
                                    <option value="6">6 Month</option>
                                    <option value="7">7 Month</option>
                                    <option value="8">8 Month</option>
                                    <option value="9">9 Month</option>
                                    <option value="10">10 Month</option>
                                    <option value="11">11 Month</option>
                                    <option value="12">12 Month</option>

                                </select>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="txt9">
                                Breakfast
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="breakfast"
                                    placeholder="Enter breakfast" [(ngModel)]="priceObj.breakfast">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="txt9">
                                Lunch
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="lunch"
                                    placeholder="Enter lunch" [(ngModel)]="priceObj.lunch">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="txt9">
                                Dinner
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="dinner"
                                    placeholder="Enter dinner" [(ngModel)]="priceObj.dinner">
                            </div>
                        </div>

                        <div class="col-12">
                            <span class="txt9">
                                Description
                            </span>
                            <textarea class="bo-rad-10 size35 bo2 txt10 p-l-20 p-t-15 m-b-10 m-t-3" name="description"
                                placeholder="Discription" [(ngModel)]="priceObj.description"></textarea>
                        </div>
                        <div class="col-md-12">

                            <div class="txt9">
                                price
                            </div>

                            <div class="wrap-inputemail size12 bo2 bo-rad-10 m-t-3 m-b-23">
                                <input class="bo-rad-10 sizefull txt10 p-l-20" type="text" name="price"
                                    placeholder="Price" [(ngModel)]="priceObj.price">
                            </div>
                        </div>

                       
                        <div class="wrap-btn-booking flex-c-m m-t-13 ">
                            <!-- Button3 -->
                            <button type="submit" class="btn3 flex-c-m size36 txt11 trans-0-4 m-b-35">
                               Add
                            </button>

                        </div>
                    </div>
                </form>
            </div>
            <div class="col-lg-3"></div>
        </div>
    </div>
</section>
